name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'LICENSE'
      - '.taskmaster/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'LICENSE'
      - '.taskmaster/**'

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: hydra
          POSTGRES_PASSWORD: hydra
          POSTGRES_DB: hydra_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hydra"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      HYDRA_DATABASE_URL: postgresql://hydra:hydra@localhost:5432/hydra_test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r web/backend/requirements.txt

      - name: Run unit tests
        run: pytest tests/unit/ -v --cov=runtime --cov=web/backend --cov-report=xml

      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  integration-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: hydra
          POSTGRES_PASSWORD: hydra
          POSTGRES_DB: hydra_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hydra"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      HYDRA_DATABASE_URL: postgresql://hydra:hydra@localhost:5432/hydra_test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r web/backend/requirements.txt

      - name: Run integration tests
        run: pytest tests/integration/ -v

  frontend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npx astro check

      - name: Build
        run: npm run build

      # --- Data integrity checks ---
      - name: "DC-1: No /job/ in E2E test navigation (must be /jobs/)"
        working-directory: ${{ github.workspace }}
        run: |
          if grep -rn 'goto.*\/job\/' web/frontend/tests/e2e/; then
            echo "::error::E2E tests reference /job/ but app route is /jobs/[id]. Fix the URLs above."
            exit 1
          fi
          echo "PASS: No /job/ references found in E2E tests"

      - name: "DC-8: JobState enum sync (backend ↔ frontend)"
        working-directory: ${{ github.workspace }}
        run: |
          BACKEND=$(sed -n '/^class JobState/,/^$/p' web/backend/models.py \
            | grep -oP '= "\K[a-z_]+(?=")' | sort)
          FRONTEND=$(sed -n '/^export type JobState/,/;$/p' web/frontend/src/lib/types.ts \
            | grep -oP "'\K[a-z_]+(?=')" | sort)
          if [ "$BACKEND" != "$FRONTEND" ]; then
            echo "::error::JobState enum mismatch between backend and frontend"
            echo "Backend values:"
            echo "$BACKEND"
            echo "Frontend values:"
            echo "$FRONTEND"
            diff <(echo "$BACKEND") <(echo "$FRONTEND") || true
            exit 1
          fi
          echo "PASS: JobState enum values match across backend and frontend"

  e2e-regression:
    runs-on: ubuntu-latest
    needs: [frontend-checks]
    continue-on-error: true  # E2E tests report results but don't block CI
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: hydra
          POSTGRES_PASSWORD: hydra
          POSTGRES_DB: hydra_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hydra"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      HYDRA_DATABASE_URL: postgresql://hydra:hydra@localhost:5432/hydra_test
      HYDRA_FAKE_WORKFLOW: '1'
      HYDRA_BACKEND_PORT: '18000'
      HYDRA_DISABLE_RELOAD: '1'
      HYDRA_SKIP_PIP_INSTALL: '1'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install -r web/backend/requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        working-directory: web/frontend
        run: npm install

      - name: Install Playwright browsers
        working-directory: web/frontend
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests (Chromium only)
        working-directory: web/frontend
        run: npx playwright test --project=chromium
        env:
          PYTHONPATH: ${{ github.workspace }}
          BACKEND_URL: http://localhost:18000

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/frontend/playwright-report/
          retention-days: 14
